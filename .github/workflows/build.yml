name: Build iOS Dylib

on:
  push:
    branches: [ "*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # سحب كل الفروع والملفات والتاريخ بالكامل لضمان عدم نقص أي ملف

    - name: Setup Official Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Download iOS SDK
      run: |
        git clone https://github.com/theos/sdks.git $HOME/theos/sdks || true

    - name: Super Find and Fix Paths
      run: |
        echo "=== جاري البحث عن ملفاتك في كل مكان ==="
        # أمر سحري يبحث عن الملفات وينسخها للمسار الرئيسي لو كانت ضائعة في مجلدات فرعية
        find . -name "*Tweak.x*" -exec cp {} . \; || true
        find . -name "*Makefile*" -exec cp {} . \; || true
        find . -name "*control*" -exec cp {} . \; || true
        find . -name "*Menu.mm*" -exec cp {} . \; || true
        
        # التأكد من الأسماء الصحيحة بدقة
        mv *tweak.x Tweak.x 2>/dev/null || true
        mv *makefile Makefile 2>/dev/null || true
        mv *menu.mm Menu.mm 2>/dev/null || true

    - name: Force Compile
      run: |
        export THEOS=$HOME/theos
        make package FINALPACKAGE=1

    - name: Upload Finished Dylib
      uses: actions/upload-artifact@v4
      with:
        name: ColorRoadModMenu-Dylib
        path: |
          .theos/obj/*.dylib
