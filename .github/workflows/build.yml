name: Build iOS Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Official Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Download iOS SDK
      run: |
        git clone https://github.com/theos/sdks.git $HOME/theos/sdks || true

    - name: Absolute Fix Paths
      run: |
        # إنشاء مجلد مؤقت لنقل الملفات وتغيير أسمائها غصب عن نظام الماك
        mkdir temp_folder
        mv Tweak.x temp_folder/tweak.x || mv tweak.x temp_folder/tweak.x || true
        mv Menu.mm temp_folder/menu.mm || mv menu.mm temp_folder/menu.mm || true
        
        # إعادة الملفات للمسار الرئيسي بأسماء صغيرة تماماً
        mv temp_folder/tweak.x ./tweak.x
        mv temp_folder/menu.mm ./menu.mm
        rm -rf temp_folder

        # إعادة كتابة الـ Makefile بدقة متناهية بحروف صغيرة
        echo "TARGET := iphone:clang:latest:15.0" > Makefile
        echo "ARCHS := arm64 arm64e" >> Makefile
        echo "include \$(THEOS)/makefiles/common.mk" >> Makefile
        echo "TWEAK_NAME := ColorRoadModMenu" >> Makefile
        echo "ColorRoadModMenu_FILES := tweak.x menu.mm" >> Makefile
        echo "ColorRoadModMenu_CFLAGS := -fobjc-arc" >> Makefile
        echo "include \$(THEOS)/makefiles/tweak.mk" >> Makefile

    - name: Compile Dylib File
      run: |
        export THEOS=$HOME/theos
        make clean
        make package FINALPACKAGE=1
