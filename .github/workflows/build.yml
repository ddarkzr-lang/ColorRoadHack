name: Build iOS Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Theos Environment
      uses: theos/setup-theos-action@v1

    - name: Compile Tweak
      run: |
        make package FINALPACKAGE=1

    - name: Upload Resulting Dylib
      uses: actions/upload-artifact@v4
      with:
        name: ColorRoadModMenu-Dylib
        path: |
          .theos/obj/*.dylib
          packages/*.deb
