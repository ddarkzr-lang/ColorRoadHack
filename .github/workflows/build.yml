name: Build iOS Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y fakeroot build-essential git perl libstorable-perl clang-14 lld-14

    - name: Setup Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Download iOS SDK if needed
      run: |
        if [ ! -d "$HOME/theos/sdks/iPhoneOS14.5.sdk" ]; then
          git clone https://github.com/theos/sdks.git $HOME/theos/sdks_new
          mv $HOME/theos/sdks_new/* $HOME/theos/sdks/ || true
        fi

    - name: Compile Tweak
      run: |
        export THEOS=$HOME/theos
        make package FINALPACKAGE=1

    - name: Upload Resulting Dylib
      uses: actions/upload-artifact@v4
      with:
        name: ColorRoadModMenu-Dylib
        path: .theos/obj/*.dylib
