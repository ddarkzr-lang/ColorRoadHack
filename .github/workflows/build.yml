name: Build iOS Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y fakeroot build-essential git perl libstorable-perl clang lld wget

    - name: Clone Theos Official Repository
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Setup Linux Toolchain
      run: |
        mkdir -p $HOME/theos/toolchain
        # تحميل الـ Toolchain الرسمية والمستقرة مباشرة
        wget https://github.com/Samgisanity/theos-toolchain-linux/releases/download/v1.0.0/toolchain-linux-arm64.tar.gz
        tar -xf toolchain-linux-arm64.tar.gz -C $HOME/theos/toolchain/

    - name: Download iOS SDK
      run: |
        git clone https://github.com/theos/sdks.git $HOME/theos/sdks || true

    - name: Compile Dylib File
      run: |
        export THEOS=$HOME/theos
        make package FINALPACKAGE=1

    - name: Upload Finished Dylib
      uses: actions/upload-artifact@v4
      with:
        name: ColorRoadModMenu-Dylib
        path: |
          .theos/obj/*.dylib
