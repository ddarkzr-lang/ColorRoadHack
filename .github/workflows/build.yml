name: Build iOS Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Official Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Download iOS SDK
      run: |
        git clone https://github.com/theos/sdks.git $HOME/theos/sdks || true

    - name: Debug Files & Fix Paths
      run: |
        echo "=== طباعة جميع الملفات الموجودة في المستودع حالياً ==="
        ls -R
        
        # البحث عن ملف tweak وإصلاح اسمه تلقائياً لو كان بحروف صغيرة أو داخل مجلد فرعي
        find . -iname "tweak.x" -exec mv {} ./Tweak.x \;
        find . -iname "makefile" -exec mv {} ./Makefile \;
        find . -iname "control" -exec mv {} ./control \;
        find . -iname "menu.mm" -exec mv {} ./Menu.mm \;

    - name: Compile Dylib File
      run: |
        export THEOS=$HOME/theos
        make package FINALPACKAGE=1

    - name: Upload Finished Dylib
      uses: actions/upload-artifact@v4
      with:
        name: ColorRoadModMenu-Dylib
        path: |
          .theos/obj/*.dylib
