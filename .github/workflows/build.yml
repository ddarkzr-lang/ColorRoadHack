name: Build iOS Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Official Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Download iOS SDK
      run: |
        git clone https://github.com/theos/sdks.git $HOME/theos/sdks || true

    - name: Rebuild Project Structure Cleanly
      run: |
        # أخذ الكود الفعلي من ملفاتك الحالية وتخزينه مؤقتاً لتفادي أي مشاكل ترميز
        cat Tweak.x > tweak_actual.x 2>/dev/null || cat tweak.x > tweak_actual.x 2>/dev/null
        cat Menu.mm > menu_actual.mm 2>/dev/null || cat menu.mm > menu_actual.mm 2>/dev/null
        
        # تنظيف كامل للمجلد من أي ملفات ذات أسماء معطوبة أو مسافات مخفية
        rm -f Makefile Tweak.x tweak.x Menu.mm menu.mm control
        
        # إنشاء ملف control نظيف تماماً
        echo "Package: com.yourcompany.colorroadhack" > control
        echo "Name: ColorRoadModMenu" >> control
        echo "Depends: mobilesubstrate" >> control
        echo "Version: 0.0.1" >> control
        echo "Architecture: iphoneos-arm" >> control
        echo "Description: Color Road Mod Menu" >> control
        echo "Maintainer: ddarkzr-lang" >> control
        echo "Author: ddarkzr-lang" >> control

        # إنشاء ملف Makefile جديد ونظيف 100% بحروف صغيرة لتطابق الملفات
        echo "TARGET := iphone:clang:latest:15.0" > Makefile
        echo "ARCHS := arm64 arm64e" >> Makefile
        echo "include \$(THEOS)/makefiles/common.mk" >> Makefile
        echo "TWEAK_NAME := ColorRoadModMenu" >> Makefile
        echo "ColorRoadModMenu_FILES := tweak.x menu.mm" >> Makefile
        echo "ColorRoadModMenu_CFLAGS := -fobjc-arc" >> Makefile
        echo "include \$(THEOS)/makefiles/tweak.mk" >> Makefile

        # إعادة تسمية ملفات الأكواد بأسماء صغيرة متوافقة تماماً وبدون مسافات
        mv tweak_actual.x ./tweak.x
        mv menu_actual.mm ./menu.mm

    - name: Compile Dylib File
      run: |
        export THEOS=$HOME/theos
        make clean
        make package FINALPACKAGE=1
